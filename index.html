<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Zwift Events</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 1rem;
      }
      table {
        border-collapse: collapse;
        width: 100%;
      }
      th,
      td {
        border: 1px solid #ccc;
        padding: 0.4rem 0.8rem;
        text-align: left;
      }
      th {
        background: #f0f0f0;
      }
      td:nth-child(4) {
        white-space: nowrap;
      }
      td:nth-child(5),
      td:nth-child(6),
      td:nth-child(7) {
        text-align: right;
      }
    </style>
  </head>
  <body>
    <h1>Zwift Upcoming Banded Events</h1>
    <div style="display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem">
      <div style="display: flex; align-items: center; gap: 0.5rem">
        <span>Date filter:</span>
        <label><input type="radio" name="date" value="all" /> All</label>
        <label><input type="radio" name="date" value="today" /> Today</label>
        <label><input type="radio" name="date" value="tomorrow" /> Tomorrow</label>
      </div>
      <div style="display: flex; align-items: center; gap: 0.5rem">
        <span>Sort:</span>
        <label><input type="radio" name="sort" value="start" /> Start</label>
        <label><input type="radio" name="sort" value="route-length" /> routeLength</label>
      </div>
    </div>
    <table id="events">
      <thead>
        <tr>
          <th>eventName</th>
          <th>routeName</th>
          <th>routeMap</th>
          <th>eventStart</th>
          <th>duration</th>
          <th>length</th>
          <th>routeLength</th>
          <th>laps</th>
          <th>ruleSet</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <script>
      // Fetches a CSV stream and calls onRows(rows)
      // for each batch of complete records as they arrive.
      async function streamCSV(url, onRows) {
        const response = await fetch(url)
        const reader = response.body.getReader()
        const decoder = new TextDecoder()
        let leftover = ""

        const parseCSVLine = (line) => {
          const fields = []
          let i = 0
          while (i < line.length) {
            if (line[i] === '"') {
              let field = ""
              i++ // skip opening quote
              while (i < line.length) {
                if (line[i] === '"' && line[i + 1] === '"') {
                  field += '"'
                  i += 2 // unescape ""
                } else if (line[i] === '"') {
                  i++ // skip closing quote
                  break
                } else {
                  field += line[i++]
                }
              }
              fields.push(field)
              if (line[i] === ",") i++ // skip field separator
            } else {
              const end = line.indexOf(",", i)
              if (end === -1) {
                fields.push(line.slice(i))
                break
              }
              fields.push(line.slice(i, end))
              i = end + 1
            }
          }
          return fields
        }

        const parseLines = (lines) => {
          const rows = []
          for (const line of lines) {
            const trimmed = line.trim()
            if (!trimmed) continue
            rows.push(parseCSVLine(trimmed))
          }
          return rows
        }

        while (true) {
          const { value, done } = await reader.read()
          if (done) break

          const chunk = leftover + decoder.decode(value, { stream: true })
          const lines = chunk.split("\n")
          leftover = lines.pop()

          const rows = parseLines(lines)
          if (rows.length) onRows(rows)
        }

        if (leftover.trim()) {
          const rows = parseLines([leftover])
          if (rows.length) onRows(rows)
        }
      }

      const todayCET = new Date().toLocaleDateString("sv", { timeZone: "Europe/Paris" })
      const tomorrowCET = new Date(Date.now() + 86400000).toLocaleDateString("sv", { timeZone: "Europe/Paris" })

      const dateParam = new URLSearchParams(location.search).get("date") ?? "all"
      // dateParam may be 'today', 'tomorrow', 'all', or an ISO date like '2026-03-30'
      const dateRadioValue = ["today", "tomorrow", "all"].includes(dateParam) ? dateParam : "today"
      document.querySelector(`input[name="date"][value="${dateRadioValue}"]`).checked = true

      const sortParam = new URLSearchParams(location.search).get("sort") ?? "start"
      const sortRadioValue = ["start", "route-length"].includes(sortParam) ? sortParam : "start"
      document.querySelector(`input[name="sort"][value="${sortRadioValue}"]`).checked = true

      function getFilterDate() {
        const param = new URLSearchParams(location.search).get("date") ?? "all"
        if (param === "today") return todayCET
        if (param === "tomorrow") return tomorrowCET
        if (param === "all") return null
        return param // raw ISO date from URL
      }

      function getSort() {
        return new URLSearchParams(location.search).get("sort") ?? "start"
      }

      let allRows = []

      function rerender() {
        const filterDate = getFilterDate()
        const sort = getSort()

        let rows = allRows.filter((fields) => !filterDate || fields[3].startsWith(filterDate))

        if (sort === "route-length") {
          rows = rows.slice().sort((a, b) => parseFloat(a[6]) - parseFloat(b[6]))
        }

        const fragment = document.createDocumentFragment()
        rows.forEach((fields) => {
          const tr = document.createElement("tr")
          fields.forEach((f) => {
            const td = document.createElement("td")
            td.textContent = f
            tr.appendChild(td)
          })
          fragment.appendChild(tr)
        })
        const tbody = document.querySelector("#events tbody")
        tbody.innerHTML = ""
        tbody.appendChild(fragment)
      }

      document.querySelectorAll('input[name="date"]').forEach((radio) => {
        radio.addEventListener("change", () => {
          const params = new URLSearchParams(location.search)
          params.set("date", radio.value)
          history.replaceState(null, "", "?" + params)
          allRows = []
          streamCSV("data.csv", collectAndRender)
        })
      })

      document.querySelectorAll('input[name="sort"]').forEach((radio) => {
        radio.addEventListener("change", () => {
          const params = new URLSearchParams(location.search)
          params.set("sort", radio.value)
          history.replaceState(null, "", "?" + params)
          rerender()
        })
      })

      function collectAndRender(rows) {
        allRows.push(...rows)
        rerender()
      }

      streamCSV("data.csv", collectAndRender)
    </script>
  </body>
</html>
