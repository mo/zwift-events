<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Zwift Events</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 1rem;
      }
      table {
        border-collapse: collapse;
        width: 100%;
      }
      th,
      td {
        border: 1px solid #ccc;
        padding: 0.4rem 0.8rem;
        text-align: left;
      }
      th {
        background: #f0f0f0;
        cursor: pointer;
        user-select: none;
      }
      th.sort-asc::after {
        content: " ▲";
      }
      th.sort-desc::after {
        content: " ▼";
      }
      td:nth-child(4) {
        white-space: nowrap;
      }
      td:nth-child(5),
      td:nth-child(6),
      td:nth-child(7),
      td:nth-child(8) {
        text-align: right;
      }
    </style>
  </head>
  <body>
    <h1>Zwift Upcoming Banded Events</h1>
    <div style="display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem">
      <div style="display: flex; align-items: center; gap: 0.5rem">
        <span>Date filter:</span>
        <label><input type="radio" name="date" value="all" /> All</label>
        <label><input type="radio" name="date" value="today" /> Today</label>
        <label><input type="radio" name="date" value="tomorrow" /> Tomorrow</label>
      </div>
    </div>
    <table id="events">
      <thead>
        <tr>
          <th data-sort="name">eventName</th>
          <th data-sort="route-name">routeName</th>
          <th data-sort="route-map">routeMap</th>
          <th data-sort="start">eventStart</th>
          <th data-sort="duration">duration</th>
          <th data-sort="length">length</th>
          <th data-sort="route-length">routeLength</th>
          <th data-sort="elevation">routeElevation</th>
          <th data-sort="laps">laps</th>
          <th data-sort="rule-set">ruleSet</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <script>
      // Fetches a CSV stream and calls onRows(rows)
      // for each batch of complete records as they arrive.
      async function streamCSV(url, onRows) {
        const response = await fetch(url)
        const reader = response.body.getReader()
        const decoder = new TextDecoder()
        let leftover = ""

        const parseCSVLine = (line) => {
          const fields = []
          let i = 0
          while (i < line.length) {
            if (line[i] === '"') {
              let field = ""
              i++ // skip opening quote
              while (i < line.length) {
                if (line[i] === '"' && line[i + 1] === '"') {
                  field += '"'
                  i += 2 // unescape ""
                } else if (line[i] === '"') {
                  i++ // skip closing quote
                  break
                } else {
                  field += line[i++]
                }
              }
              fields.push(field)
              if (line[i] === ",") i++ // skip field separator
            } else {
              const end = line.indexOf(",", i)
              if (end === -1) {
                fields.push(line.slice(i))
                break
              }
              fields.push(line.slice(i, end))
              i = end + 1
            }
          }
          return fields
        }

        const parseLines = (lines) => {
          const rows = []
          for (const line of lines) {
            const trimmed = line.trim()
            if (!trimmed) continue
            rows.push(parseCSVLine(trimmed))
          }
          return rows
        }

        while (true) {
          const { value, done } = await reader.read()
          if (done) break

          const chunk = leftover + decoder.decode(value, { stream: true })
          const lines = chunk.split("\n")
          leftover = lines.pop()

          const rows = parseLines(lines)
          if (rows.length) onRows(rows)
        }

        if (leftover.trim()) {
          const rows = parseLines([leftover])
          if (rows.length) onRows(rows)
        }
      }

      const todayCET = new Date().toLocaleDateString("sv", { timeZone: "Europe/Paris" })
      const tomorrowCET = new Date(Date.now() + 86400000).toLocaleDateString("sv", { timeZone: "Europe/Paris" })

      const dateParam = new URLSearchParams(location.search).get("date") ?? "all"
      // dateParam may be 'today', 'tomorrow', 'all', or an ISO date like '2026-03-30'
      const dateRadioValue = ["today", "tomorrow", "all"].includes(dateParam) ? dateParam : "today"
      document.querySelector(`input[name="date"][value="${dateRadioValue}"]`).checked = true

      function getFilterDate() {
        const param = new URLSearchParams(location.search).get("date") ?? "all"
        if (param === "today") return todayCET
        if (param === "tomorrow") return tomorrowCET
        if (param === "all") return null
        return param // raw ISO date from URL
      }

      // sort key → [column index, numeric?]
      const SORT_COLS = {
        name: [0, false],
        "route-name": [1, false],
        "route-map": [2, false],
        start: [3, false],
        duration: [4, true],
        length: [5, true],
        "route-length": [6, true],
        elevation: [7, true],
        laps: [8, true],
        "rule-set": [9, false],
      }

      function getSort() {
        const raw = new URLSearchParams(location.search).get("sort") ?? "start:asc"
        const [key, dir] = raw.split(":")
        return { key: SORT_COLS[key] ? key : "start", dir: dir === "desc" ? "desc" : "asc" }
      }

      function updateSortHeaders() {
        const { key, dir } = getSort()
        document.querySelectorAll("#events th[data-sort]").forEach((th) => {
          th.classList.remove("sort-asc", "sort-desc")
          if (th.dataset.sort === key) th.classList.add(dir === "desc" ? "sort-desc" : "sort-asc")
        })
      }

      let allRows = []

      function rerender() {
        const filterDate = getFilterDate()
        const { key, dir } = getSort()
        const [colIdx, numeric] = SORT_COLS[key]

        let rows = allRows.filter((fields) => !filterDate || fields[3].startsWith(filterDate))

        rows = rows.slice().sort((a, b) => {
          const av = numeric ? parseFloat(a[colIdx]) : a[colIdx]
          const bv = numeric ? parseFloat(b[colIdx]) : b[colIdx]
          const cmp = av < bv ? -1 : av > bv ? 1 : 0
          return dir === "desc" ? -cmp : cmp
        })

        const fragment = document.createDocumentFragment()
        rows.forEach((fields) => {
          const tr = document.createElement("tr")
          fields.forEach((f) => {
            const td = document.createElement("td")
            td.textContent = f
            tr.appendChild(td)
          })
          fragment.appendChild(tr)
        })
        const tbody = document.querySelector("#events tbody")
        tbody.innerHTML = ""
        tbody.appendChild(fragment)
        updateSortHeaders()
      }

      document.querySelectorAll('input[name="date"]').forEach((radio) => {
        radio.addEventListener("change", () => {
          const params = new URLSearchParams(location.search)
          params.set("date", radio.value)
          history.replaceState(null, "", "?" + params)
          allRows = []
          streamCSV("data.csv", collectAndRender)
        })
      })

      document.querySelectorAll("#events th[data-sort]").forEach((th) => {
        th.addEventListener("click", () => {
          const { key, dir } = getSort()
          const newKey = th.dataset.sort
          const newDir = newKey === key && dir === "asc" ? "desc" : "asc"
          const params = new URLSearchParams(location.search)
          params.set("sort", `${newKey}:${newDir}`)
          history.replaceState(null, "", "?" + params)
          rerender()
        })
      })

      function collectAndRender(rows) {
        allRows.push(...rows)
        rerender()
      }

      updateSortHeaders()
      streamCSV("data.csv", collectAndRender)
    </script>
  </body>
</html>
